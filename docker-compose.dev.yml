# Development override - use with: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
services:
  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile.dev
    volumes:
      - ./packages/api/src:/app/packages/api/src:ro
      - ./packages/database/src:/app/packages/database/src:ro
    environment:
      NODE_ENV: development

