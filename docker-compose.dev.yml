# Development override - use with: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
services:
  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile.dev
    volumes:
      - ./packages/backend/src:/app/packages/backend/src:ro
      - ./packages/database/src:/app/packages/database/src:ro
    environment:
      NODE_ENV: development

